apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pod-tier-nginx
  namespace: shared-svcs-23vh7
spec:
  project: default
  source:
    repoURL: 'https://github.com/tkrausjr/vcf-argocd-gitops.git'
    targetRevision: main
    path: multi-tier/apps/container-app
    directory:
      recurse: true
  destination:
    name: vcf-cli-demo-cl01-shared-svcs-23vh7@demo-cl01-shared-svcs-23vh7
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
